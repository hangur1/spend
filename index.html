<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spend Campaign Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f0ec;
      --surface: #ffffff;
      --border: #e2e2dc;
      --text: #1a1a18;
      --muted: #888880;
      --header-bg: #2a2a26;
      --phase-bg: #3a3a34;

      /* Channel colors — pastel, distinct */
      --c-creative:    #c8dff0;
      --c-comms:       #d4c8f0;
      --c-social:      #c8f0d8;
      --c-stories:     #f0c8c8;
      --c-events:      #f0dcc8;
      --c-lifecycle:   #c8eef0;
      --c-web:         #d8c8f0;
      --c-paid:        #f0c8e8;
      --c-pmm:         #e8f0c8;
      --c-brand:       #f0e8c8;
      --c-comms2:      #d4c8f0;
      --c-default:     #e8e8e2;

      --phase-tease:    #f0dcc8;
      --phase-embargo:  #c8d4f0;
      --phase-1:        #c8f0d8;
      --phase-2:        #d4c8f0;
      --phase-3:        #f0c8c8;
      --phase-sustain:  #e8f0c8;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 13px;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .topbar-subtitle {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .badge {
      background: var(--header-bg);
      color: #fff;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      color: var(--text);
      transition: background 0.15s;
    }
    .refresh-btn:hover { background: var(--bg); }
    .refresh-btn svg { transition: transform 0.4s; }
    .refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .filter-label { font-size: 11px; color: var(--muted); margin-right: 4px; white-space: nowrap; }
    .filter-chip {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      background: var(--bg);
    }
    .filter-chip.active {
      background: var(--header-bg);
      color: #fff;
      border-color: var(--header-bg);
    }
    .filter-divider { width: 1px; height: 16px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

    /* ── GRID WRAPPER ── */
    .grid-wrapper {
      overflow-x: auto;
      padding: 20px 24px 40px;
    }

    /* ── TIMELINE GRID ── */
    .timeline {
      min-width: 1100px;
      display: grid;
      grid-template-columns: 90px repeat(var(--phase-count, 6), 1fr);
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      position: relative;
    }
    /* Channel rows span all columns */
    .channel-row {
      grid-column: 1 / -1;
    }

    /* Phase headers */
    .phase-header-row {
      display: contents;
    }
    .corner-cell {
      background: var(--header-bg);
      border-right: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      min-height: 38px;
    }
    .phase-header {
      background: var(--header-bg);
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 10px 14px;
      border-right: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .phase-header-top { display: flex; align-items: center; }
    .phase-subtitle {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: none;
      color: rgba(255,255,255,0.45);
      padding-left: 13px;
    }
    .phase-header:last-child { border-right: none; }
    .phase-dot {
      width: 6px; height: 6px; border-radius: 50%; margin-right: 7px; flex-shrink: 0;
    }

    /* Channel rows — each row is a flex container */
    .channel-row {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .channel-row.last { border-bottom: none; }
    .channel-label {
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-right: 1px solid var(--border);
      padding: 12px 6px;
      min-height: 90px;
      width: 90px;
      flex-shrink: 0;
    }
    /* The cells area is a CSS grid that mirrors the phase columns */
    .row-cells {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(var(--phase-count, 6), 1fr);
      min-width: 0;
    }
    .phase-cell {
      border-right: 1px solid var(--border);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-height: 90px;
      position: relative;
    }
    .phase-cell.last-col { border-right: none; }
    /* Spanning card sits outside normal flow, placed via grid-column */
    .spanning-slot {
      display: grid;
      grid-template-columns: subgrid;
      position: relative;
    }

    /* Task cards */
    .task-card {
      border-radius: 5px;
      padding: 6px 8px;
      font-size: 11px;
      line-height: 1.4;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      display: block;
      transition: transform 0.1s, box-shadow 0.1s;
      border: 1px solid transparent;
      word-break: break-word;
    }
    .task-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(0,0,0,0.12);
      border-color: rgba(0,0,0,0.08);
    }
    .task-card .card-phase-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 4px;
    }
    .card-phase-tag {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(0,0,0,0.07);
      font-family: 'DM Mono', monospace;
    }

    /* Spanning tasks (multi-phase) */
    .span-indicator {
      font-size: 9px;
      color: var(--muted);
      margin-top: 2px;
      font-family: 'DM Mono', monospace;
    }

    /* Empty state */
    .empty-cell { color: var(--border); font-size: 10px; text-align: center; padding-top: 6px; }

    /* Loading / error */
    .status-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px 24px;
      color: var(--muted);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .last-updated {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 24px;
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .stat { display: flex; flex-direction: column; gap: 1px; }
    .stat-value { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div>
      <div class="topbar-title">Spend Campaign Timeline</div>
      <div class="topbar-subtitle">T1 - Spend Management + Standalone IO Launch</div>
    </div>
    <span class="badge">LIVE</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadTasks()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Refresh
    </button>
  </div>
</div>

<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stat"><div class="stat-value" id="statTotal">—</div><div class="stat-label">Total Tasks</div></div>
  <div class="stat"><div class="stat-value" id="statPhased">—</div><div class="stat-label">With Phase</div></div>
  <div class="stat"><div class="stat-value" id="statChannels">—</div><div class="stat-label">Channels Active</div></div>
</div>

<div class="filters" id="filtersBar" style="display:none">
  <span class="filter-label">CHANNEL</span>
  <div id="channelFilters" style="display:contents"></div>
  <div class="filter-divider"></div>
  <span class="filter-label">PHASE</span>
  <div id="phaseFilters" style="display:contents"></div>
</div>

<div class="grid-wrapper" id="gridWrapper">
  <div class="status-overlay"><div class="spinner"></div><span>Loading from Asana…</span></div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const PHASE_ORDER = ['Tease', 'Embargo', 'Phase 1', 'Phase 2', 'Phase 3', 'Sustain'];

const PHASE_COLORS = {
  'Tease':   { dot: '#f0a050', bg: '#fdf5ee' },
  'Embargo': { dot: '#6090e0', bg: '#eef3fc' },
  'Phase 1': { dot: '#50c878', bg: '#eefaf2' },
  'Phase 2': { dot: '#9b70e0', bg: '#f4eefb' },
  'Phase 3': { dot: '#e07070', bg: '#fbeeed' },
  'Sustain': { dot: '#90b050', bg: '#f4f9eb' },
};

// Channel → color map (matches screenshot pastel palette)
const CHANNEL_COLORS = {
  'Creative':              '#c8dff0',
  'Video':                 '#c8dff0',
  'Brand':                 '#c8dff0',
  'Communications':        '#d4c8f0',
  'Social':                '#c8f0d8',
  'Stories':               '#f0c8c8',
  'Events':                '#f0dcc8',
  'Community':             '#f0dcc8',
  'Lifecycle':             '#c8eef0',
  'FEM':                   '#e0d8f8',
  'Performance Marketing': '#f0c8e8',
  'PMM':                   '#e8f0c8',
  'Design':                '#cce8f4',
  'Copy':                  '#d8c8f0',
  'Data Science':          '#e8f4c8',
};

// Which channels map to which "display row"
const CHANNEL_ROWS = [
  { label: 'Creative',   matches: ['Creative','Video','Brand','Design'] },
  { label: 'Comms',      matches: ['Communications','PMM','Copy'] },
  { label: 'Social',     matches: ['Social'] },
  { label: 'Stories',    matches: ['Stories'] },
  { label: 'Events',     matches: ['Events','Community'] },
  { label: 'Lifecycle',  matches: ['Lifecycle'] },
  { label: 'Web / FEM',  matches: ['FEM','In product/UX'] },
  { label: 'Paid Social',matches: ['Performance Marketing'] },
];

// ── State ────────────────────────────────────────────────────────────────────
let allTasks = [];
let activeChannels = new Set();
let activePhases = new Set();
let allChannels = [];
let allPhases = [];

// ── Fetch ────────────────────────────────────────────────────────────────────
async function loadTasks() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    const res = await fetch('/api/tasks');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error + (data.stack ? '\n' + data.stack : ''));
    allTasks = data.tasks;
    processData();
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('gridWrapper').innerHTML =
      `<div class="status-overlay"><span style="color:#c05">Error: ${e.message}</span><small>Check ASANA_TOKEN env var</small></div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

function processData() {
  // Collect unique channels and phases from actual data
  const channelSet = new Set();
  const phaseSet = new Set();
  allTasks.forEach(t => {
    if (t.channel) channelSet.add(t.channel);
    t.phases.forEach(p => phaseSet.add(p));
  });
  allChannels = [...channelSet].sort();
  allPhases = PHASE_ORDER.filter(p => phaseSet.has(p));

  // Default: show all
  activeChannels = new Set(allChannels);
  activePhases = new Set(allPhases);

  // Stats
  const statsBar = document.getElementById('statsBar');
  statsBar.style.display = 'flex';
  document.getElementById('statTotal').textContent = allTasks.length;
  document.getElementById('statPhased').textContent = allTasks.filter(t => t.phases.length > 0).length;
  document.getElementById('statChannels').textContent = channelSet.size;

  renderFilters();
  renderGrid();
}

function renderFilters() {
  document.getElementById('filtersBar').style.display = 'flex';

  const cf = document.getElementById('channelFilters');
  cf.innerHTML = '';
  // Show row-level filters
  CHANNEL_ROWS.forEach(row => {
    const hasAny = allTasks.some(t => row.matches.includes(t.channel));
    if (!hasAny) return;
    const chip = document.createElement('button');
    chip.className = 'filter-chip active';
    chip.dataset.type = 'channel';
    chip.dataset.value = row.label;
    chip.textContent = row.label;
    chip.onclick = () => toggleChannelFilter(row.label, chip);
    cf.appendChild(chip);
  });

  const pf = document.getElementById('phaseFilters');
  pf.innerHTML = '';
  allPhases.forEach(phase => {
    const chip = document.createElement('button');
    chip.className = 'filter-chip active';
    chip.dataset.type = 'phase';
    chip.dataset.value = phase;
    chip.textContent = phase;
    chip.onclick = () => togglePhaseFilter(phase, chip);
    pf.appendChild(chip);
  });
}

// Track active row filters separately
let activeRowFilters = new Set(CHANNEL_ROWS.map(r => r.label));

function toggleChannelFilter(label, chip) {
  if (activeRowFilters.has(label)) { activeRowFilters.delete(label); chip.classList.remove('active'); }
  else { activeRowFilters.add(label); chip.classList.add('active'); }
  renderGrid();
}

function togglePhaseFilter(phase, chip) {
  if (activePhases.has(phase)) { activePhases.delete(phase); chip.classList.remove('active'); }
  else { activePhases.add(phase); chip.classList.add('active'); }
  renderGrid();
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderGrid() {
  const visiblePhases = PHASE_ORDER.filter(p => activePhases.has(p) && allPhases.includes(p));
  const visibleRows = CHANNEL_ROWS.filter(row => {
    if (!activeRowFilters.has(row.label)) return false;
    return allTasks.some(t => row.matches.includes(t.channel));
  });

  if (visiblePhases.length === 0 || visibleRows.length === 0) {
    document.getElementById('gridWrapper').innerHTML = '<div class="status-overlay"><span>No matching tasks</span></div>';
    return;
  }

  const wrapper = document.getElementById('gridWrapper');
  wrapper.innerHTML = '';

  const grid = document.createElement('div');
  grid.className = 'timeline';
  grid.style.setProperty('--phase-count', visiblePhases.length);

  // Header row
  const corner = document.createElement('div');
  corner.className = 'corner-cell';
  grid.appendChild(corner);

  const PHASE_SUBTITLES = {
    'Phase 1': 'Budgets, team spend features',
    'Phase 2': 'Artist card collaboration',
    'Phase 3': 'Agentic cards',
  };

  visiblePhases.forEach(phase => {
    const header = document.createElement('div');
    header.className = 'phase-header';
    const top = document.createElement('div');
    top.className = 'phase-header-top';
    const dot = document.createElement('span');
    dot.className = 'phase-dot';
    dot.style.background = PHASE_COLORS[phase]?.dot || '#ccc';
    top.appendChild(dot);
    top.appendChild(document.createTextNode(phase));
    header.appendChild(top);
    if (PHASE_SUBTITLES[phase]) {
      const sub = document.createElement('div');
      sub.className = 'phase-subtitle';
      sub.textContent = PHASE_SUBTITLES[phase];
      header.appendChild(sub);
    }
    grid.appendChild(header);
  });

  // Channel rows
  visibleRows.forEach((row, rowIdx) => {
    const rowEl = document.createElement('div');
    rowEl.className = 'channel-row' + (rowIdx === visibleRows.length - 1 ? ' last' : '');
    // need full width for the grid
    rowEl.style.gridColumn = '1 / -1';

    const label = document.createElement('div');
    label.className = 'channel-label';
    label.textContent = row.label;
    rowEl.appendChild(label);

    const cellsEl = document.createElement('div');
    cellsEl.className = 'row-cells';
    cellsEl.style.setProperty('--phase-count', visiblePhases.length);

    // Get tasks for this row that have at least one visible phase
    const rowTasks = allTasks.filter(t =>
      row.matches.includes(t.channel) &&
      t.phases.some(p => visiblePhases.includes(p))
    );

    // Track which tasks have already been rendered (for spanning ones)
    const renderedTaskGids = new Set();

    // Build empty cells first
    const cells = visiblePhases.map((phase, colIdx) => {
      const cell = document.createElement('div');
      cell.className = 'phase-cell' + (colIdx === visiblePhases.length - 1 ? ' last-col' : '');
      if (PHASE_COLORS[phase]) cell.style.background = PHASE_COLORS[phase].bg;
      cell.dataset.phaseIdx = colIdx;
      cellsEl.appendChild(cell);
      return cell;
    });

    // Place tasks — spanning ones go into their first phase cell but span columns
    rowTasks.forEach(task => {
      if (renderedTaskGids.has(task.gid)) return;

      // Figure out which visible phases this task covers, and if they are contiguous
      const taskPhaseIdxs = task.phases
        .map(p => visiblePhases.indexOf(p))
        .filter(i => i !== -1)
        .sort((a, b) => a - b);

      if (taskPhaseIdxs.length === 0) return;
      renderedTaskGids.add(task.gid);

      const firstIdx = taskPhaseIdxs[0];
      const lastIdx = taskPhaseIdxs[taskPhaseIdxs.length - 1];
      // Check contiguous
      const isContiguous = taskPhaseIdxs.every((idx, i) => i === 0 || idx === taskPhaseIdxs[i-1] + 1);
      const spanCount = isContiguous ? (lastIdx - firstIdx + 1) : 1;

      const card = document.createElement('a');
      card.className = 'task-card';
      card.href = task.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';

      const color = CHANNEL_COLORS[task.channel] || '#e8e8e2';
      card.style.background = color;

      if (spanCount > 1) {
        // Spans multiple columns — use grid-column on the card itself
        // Place it in the first cell but make it overflow via absolute/grid magic
        // Easier: give card grid-column span on a wrapper inside the cell
        card.style.gridColumn = `span ${spanCount}`;
        card.style.zIndex = '2';
      }

      const nameEl = document.createElement('div');
      nameEl.textContent = task.name;
      card.appendChild(nameEl);

      if (task.due_on) {
        const dateEl = document.createElement('div');
        dateEl.style.cssText = 'font-size:9px;color:rgba(0,0,0,0.45);margin-top:3px;font-family:DM Mono,monospace;';
        dateEl.textContent = formatDate(task.due_on);
        card.appendChild(dateEl);
      }

      if (spanCount > 1) {
        // Wrap in a spanning grid overlay across those cells
        // Inject a subgrid wrapper that sits across the cells
        const wrapper = document.createElement('div');
        wrapper.style.cssText = `
          grid-column: ${firstIdx + 1} / ${lastIdx + 2};
          grid-row: 1;
          display: flex;
          padding: 8px;
          pointer-events: none;
          position: relative;
          z-index: 2;
        `;
        card.style.flex = '1';
        card.style.pointerEvents = 'auto';
        wrapper.appendChild(card);

        // We need to place this wrapper as an overlay on the cells grid
        // Create an overlay grid that sits on top of row-cells
        // Instead, append to a special overlay layer
        // Simpler approach: use a position:relative container
        cellsEl.style.position = 'relative';
        const overlay = document.createElement('div');
        overlay.style.cssText = `
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          display: grid;
          grid-template-columns: repeat(${visiblePhases.length}, 1fr);
          pointer-events: none;
          z-index: 2;
        `;
        overlay.dataset.overlayFor = task.gid;

        const spacer = document.createElement('div');
        spacer.style.cssText = `grid-column: 1 / ${firstIdx + 1}; grid-row: 1;`;

        const cardWrapper = document.createElement('div');
        cardWrapper.style.cssText = `
          grid-column: ${firstIdx + 1} / ${lastIdx + 2};
          grid-row: 1;
          padding: 8px;
          display: flex;
          pointer-events: none;
          align-items: flex-start;
        `;
        card.style.flex = '1';
        card.style.minWidth = '0';
        card.style.pointerEvents = 'auto';
        cardWrapper.appendChild(card);
        if (firstIdx > 0) overlay.appendChild(spacer);
        overlay.appendChild(cardWrapper);
        cellsEl.appendChild(overlay);
      } else {
        cells[firstIdx].appendChild(card);
      }
    });

    rowEl.appendChild(cellsEl);
    grid.appendChild(rowEl);
  });

  wrapper.appendChild(grid);
}

function formatDate(d) {
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(day)}`;
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadTasks();
// Auto-refresh every 2 minutes
setInterval(loadTasks, 120000);
</script>
</body>
</html>
