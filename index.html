<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spend Campaign Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f0ec;
      --surface: #ffffff;
      --border: #e2e2dc;
      --text: #1a1a18;
      --muted: #888880;
      --header-bg: #2a2a26;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 13px;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-title { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
    .topbar-subtitle { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .badge { background: var(--header-bg); color: #fff; font-size: 10px; font-family: 'DM Mono', monospace; padding: 3px 8px; border-radius: 4px; }
    .refresh-btn {
      display: flex; align-items: center; gap: 6px;
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 12px; font-family: 'DM Sans', sans-serif; font-size: 12px;
      cursor: pointer; color: var(--text); transition: background 0.15s;
    }
    .refresh-btn:hover { background: var(--bg); }
    .refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .last-updated { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

    /* ── STATS ── */
    .stats-bar {
      display: flex; gap: 24px; padding: 10px 24px;
      border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .stat { display: flex; flex-direction: column; gap: 1px; }
    .stat-value { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    /* ── FILTERS ── */
    .filters {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 24px; background: var(--surface);
      border-bottom: 1px solid var(--border); overflow-x: auto;
    }
    .filter-label { font-size: 11px; color: var(--muted); margin-right: 4px; white-space: nowrap; }
    .filter-chip {
      border: 1px solid var(--border); border-radius: 20px;
      padding: 4px 12px; font-size: 11px; cursor: pointer;
      white-space: nowrap; transition: all 0.15s; background: var(--bg);
    }
    .filter-chip.active { background: var(--header-bg); color: #fff; border-color: var(--header-bg); }
    .filter-divider { width: 1px; height: 16px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

    /* ── GRID WRAPPER ── */
    .grid-wrapper { overflow-x: auto; padding: 20px 24px 40px; }

    /* ── TIMELINE ── */
    .timeline {
      min-width: 900px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
    }

    /* Header row */
    .header-row {
      display: grid;
      grid-template-columns: 80px repeat(var(--phase-count, 5), 1fr);
    }
    .corner-cell {
      background: var(--header-bg);
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .phase-header {
      background: var(--header-bg);
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 10px 12px;
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .phase-header:last-child { border-right: none; }
    .phase-header-top { display: flex; align-items: center; gap: 6px; }
    .phase-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .phase-subtitle { font-size: 9px; font-weight: 400; color: rgba(255,255,255,0.4); text-transform: none; letter-spacing: 0; padding-left: 12px; }

    /* Channel rows */
    .channel-row {
      display: flex;
      border-top: 1px solid var(--border);
    }
    .channel-label {
      width: 80px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-right: 1px solid var(--border);
      padding: 10px 4px;
      min-height: 80px;
    }

    /* The cells area: flex column containing span-row then stack-row */
    .row-cells {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Spanning cards row — only shown when there are spanning tasks */
    .span-row {
      display: grid;
      grid-template-columns: repeat(var(--phase-count, 5), 1fr);
      border-bottom: 1px dashed var(--border);
      padding: 6px 0;
      min-height: 0;
      background: transparent;
    }
    .span-row:empty { display: none; padding: 0; border-bottom: none; }

    /* Single-phase cards row */
    .stack-row {
      display: grid;
      grid-template-columns: repeat(var(--phase-count, 5), 1fr);
      flex: 1;
    }
    .phase-cell {
      border-right: 1px solid var(--border);
      padding: 7px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-height: 80px;
    }
    .phase-cell.last-col { border-right: none; }

    /* Task cards */
    .task-card {
      border-radius: 6px;
      padding: 7px 9px;
      font-size: 11px;
      line-height: 1.4;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      display: block;
      transition: transform 0.1s, box-shadow 0.1s;
      border: 1px solid rgba(0,0,0,0.06);
      word-break: break-word;
    }
    .task-card:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.1); }
    .task-card .task-name { font-weight: 500; }
    .task-card .task-meta { font-size: 9px; color: rgba(0,0,0,0.4); margin-top: 3px; font-family: 'DM Mono', monospace; }

    /* Spanning card padding */
    .span-card-wrap {
      padding: 0 7px;
      display: flex;
      flex-direction: column;
      background: transparent;
    }

    /* Loading */
    .status-overlay {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding: 60px 24px; color: var(--muted);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border); border-top-color: var(--text);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div>
      <div class="topbar-title">Spend Campaign Timeline</div>
      <div class="topbar-subtitle">T1 – Spend Management + Standalone IO Launch</div>
    </div>
    <span class="badge">LIVE</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadTasks()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Refresh
    </button>
  </div>
</div>

<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stat"><div class="stat-value" id="statTotal">—</div><div class="stat-label">Tasks</div></div>
  <div class="stat"><div class="stat-value" id="statChannels">—</div><div class="stat-label">Channels</div></div>
</div>

<div class="filters" id="filtersBar" style="display:none">
  <span class="filter-label">CHANNEL</span>
  <div id="channelFilters" style="display:contents"></div>
  <div class="filter-divider"></div>
  <span class="filter-label">PHASE</span>
  <div id="phaseFilters" style="display:contents"></div>
</div>

<div class="grid-wrapper" id="gridWrapper">
  <div class="status-overlay"><div class="spinner"></div><span>Loading from Asana…</span></div>
</div>

<script>
const PHASE_ORDER = ['Tease', 'Embargo', 'Phase 1', 'Phase 2', 'Phase 3', 'Sustain'];

const PHASE_COLORS = {
  'Tease':   { dot: '#f0a050', bg: '#fffaf5' },
  'Embargo': { dot: '#6090e0', bg: '#f5f8ff' },
  'Phase 1': { dot: '#50c878', bg: '#f5fdf7' },
  'Phase 2': { dot: '#9b70e0', bg: '#f8f5ff' },
  'Phase 3': { dot: '#e07070', bg: '#fff5f5' },
  'Sustain': { dot: '#90b050', bg: '#f8fdf0' },
};

const PHASE_SUBTITLES = {
  'Phase 1': 'Budgets, team spend features',
  'Phase 2': 'Artist card collaboration',
  'Phase 3': 'Agentic cards',
};

const CHANNEL_COLORS = {
  'Creative': '#c8dff0', 'Video': '#c8dff0', 'Brand': '#c8dff0', 'Design': '#cce8f4',
  'Communications': '#d4c8f0', 'PMM': '#e8f0c8', 'Copy': '#d8c8f0',
  'Social': '#c8f0d8',
  'Stories': '#f0c8c8',
  'Events': '#f0dcc8', 'Community': '#f0dcc8',
  'Lifecycle': '#c8eef0',
  'FEM': '#e0d8f8', 'In product/UX': '#e0d8f8',
  'Performance Marketing': '#f0c8e8',
};

const CHANNEL_ROWS = [
  { label: 'Creative',    matches: ['Creative','Video','Brand','Design'] },
  { label: 'Comms',       matches: ['Communications','PMM','Copy'] },
  { label: 'Social',      matches: ['Social'] },
  { label: 'Stories',     matches: ['Stories'] },
  { label: 'Events',      matches: ['Events','Community'] },
  { label: 'Lifecycle',   matches: ['Lifecycle'] },
  { label: 'Web / FEM',   matches: ['FEM','In product/UX'] },
  { label: 'Paid Social', matches: ['Performance Marketing'] },
];

let allTasks = [];
let allPhases = [];
let activePhases = new Set();
let activeRowFilters = new Set(CHANNEL_ROWS.map(r => r.label));

async function loadTasks() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    const res = await fetch('/api/tasks');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allTasks = data.tasks;
    processData();
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('gridWrapper').innerHTML =
      `<div class="status-overlay"><span style="color:#c05">Error: ${e.message}</span></div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

function processData() {
  const phaseSet = new Set();
  const channelSet = new Set();
  allTasks.forEach(t => {
    t.phases.forEach(p => phaseSet.add(p));
    if (t.channel) channelSet.add(t.channel);
  });
  allPhases = PHASE_ORDER.filter(p => phaseSet.has(p));
  activePhases = new Set(allPhases);

  document.getElementById('statsBar').style.display = 'flex';
  document.getElementById('statTotal').textContent = allTasks.length;
  document.getElementById('statChannels').textContent = channelSet.size;

  renderFilters();
  renderGrid();
}

function renderFilters() {
  document.getElementById('filtersBar').style.display = 'flex';

  const cf = document.getElementById('channelFilters');
  cf.innerHTML = '';
  CHANNEL_ROWS.forEach(row => {
    if (!allTasks.some(t => row.matches.includes(t.channel))) return;
    const chip = document.createElement('button');
    chip.className = 'filter-chip active';
    chip.textContent = row.label;
    chip.onclick = () => {
      if (activeRowFilters.has(row.label)) { activeRowFilters.delete(row.label); chip.classList.remove('active'); }
      else { activeRowFilters.add(row.label); chip.classList.add('active'); }
      renderGrid();
    };
    cf.appendChild(chip);
  });

  const pf = document.getElementById('phaseFilters');
  pf.innerHTML = '';
  allPhases.forEach(phase => {
    const chip = document.createElement('button');
    chip.className = 'filter-chip active';
    chip.textContent = phase;
    chip.onclick = () => {
      if (activePhases.has(phase)) { activePhases.delete(phase); chip.classList.remove('active'); }
      else { activePhases.add(phase); chip.classList.add('active'); }
      renderGrid();
    };
    pf.appendChild(chip);
  });
}

function renderGrid() {
  const visiblePhases = PHASE_ORDER.filter(p => activePhases.has(p) && allPhases.includes(p));
  const visibleRows = CHANNEL_ROWS.filter(row => {
    if (!activeRowFilters.has(row.label)) return false;
    return allTasks.some(t => row.matches.includes(t.channel) && t.phases.some(p => visiblePhases.includes(p)));
  });

  if (!visiblePhases.length || !visibleRows.length) {
    document.getElementById('gridWrapper').innerHTML = '<div class="status-overlay"><span>No matching tasks</span></div>';
    return;
  }

  const n = visiblePhases.length;
  const wrapper = document.getElementById('gridWrapper');
  wrapper.innerHTML = '';

  const timeline = document.createElement('div');
  timeline.className = 'timeline';

  // ── Header ──
  const headerRow = document.createElement('div');
  headerRow.className = 'header-row';
  headerRow.style.setProperty('--phase-count', n);

  const corner = document.createElement('div');
  corner.className = 'corner-cell';
  headerRow.appendChild(corner);

  visiblePhases.forEach(phase => {
    const h = document.createElement('div');
    h.className = 'phase-header';
    const top = document.createElement('div');
    top.className = 'phase-header-top';
    const dot = document.createElement('span');
    dot.className = 'phase-dot';
    dot.style.background = PHASE_COLORS[phase]?.dot || '#ccc';
    top.appendChild(dot);
    top.appendChild(document.createTextNode(phase));
    h.appendChild(top);
    if (PHASE_SUBTITLES[phase]) {
      const sub = document.createElement('div');
      sub.className = 'phase-subtitle';
      sub.textContent = PHASE_SUBTITLES[phase];
      h.appendChild(sub);
    }
    headerRow.appendChild(h);
  });
  timeline.appendChild(headerRow);

  // ── Channel rows ──
  visibleRows.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'channel-row';

    const labelEl = document.createElement('div');
    labelEl.className = 'channel-label';
    labelEl.textContent = row.label;
    rowEl.appendChild(labelEl);

    const cellsEl = document.createElement('div');
    cellsEl.className = 'row-cells';

    const rowTasks = allTasks.filter(t =>
      row.matches.includes(t.channel) &&
      t.phases.some(p => visiblePhases.includes(p))
    );

    // Categorise: spanning (contiguous multi-phase) vs single-column
    const spanTasks = [];   // { task, start, end }
    const singleTasks = []; // { task, colIdx }

    rowTasks.forEach(task => {
      const idxs = task.phases
        .map(p => visiblePhases.indexOf(p))
        .filter(i => i !== -1)
        .sort((a, b) => a - b);
      if (!idxs.length) return;

      const contiguous = idxs.length > 1 &&
        idxs.every((v, i) => i === 0 || v === idxs[i-1] + 1);

      if (contiguous) {
        spanTasks.push({ task, start: idxs[0], end: idxs[idxs.length - 1] });
      } else {
        // Place in each individual column
        idxs.forEach(idx => singleTasks.push({ task, colIdx: idx }));
      }
    });

    // ── Span row ──
    const spanRow = document.createElement('div');
    spanRow.className = 'span-row';
    spanRow.style.setProperty('--phase-count', n);
    spanRow.style.position = 'relative';

    // Add colored column backgrounds for the span row
    visiblePhases.forEach((phase, colIdx) => {
      const bg = document.createElement('div');
      bg.style.cssText = `
        position: absolute;
        top: 0; bottom: 0;
        left: calc(${colIdx} * (100% / ${n}));
        width: calc(100% / ${n});
        background: ${PHASE_COLORS[phase]?.bg || '#fff'};
        z-index: 0;
        ${colIdx > 0 ? 'border-left: 1px solid var(--border);' : ''}
      `;
      spanRow.appendChild(bg);
    });

    spanTasks.forEach(({ task, start, end }) => {
      const wrap = document.createElement('div');
      wrap.className = 'span-card-wrap';
      wrap.style.gridColumn = `${start + 1} / ${end + 2}`;
      wrap.style.position = 'relative';
      wrap.style.zIndex = '1';

      const card = makeCard(task);
      card.style.flex = '1';
      const spanMeta = document.createElement('div');
      spanMeta.className = 'task-meta';
      spanMeta.textContent = visiblePhases.slice(start, end + 1).join(' → ');
      card.appendChild(spanMeta);
      wrap.appendChild(card);
      spanRow.appendChild(wrap);
    });

    if (spanTasks.length) cellsEl.appendChild(spanRow);

    // ── Stack row ──
    const stackRow = document.createElement('div');
    stackRow.className = 'stack-row';
    stackRow.style.setProperty('--phase-count', n);

    visiblePhases.forEach((phase, colIdx) => {
      const cell = document.createElement('div');
      cell.className = 'phase-cell' + (colIdx === n - 1 ? ' last-col' : '');
      if (PHASE_COLORS[phase]) cell.style.background = PHASE_COLORS[phase].bg;

      singleTasks
        .filter(s => s.colIdx === colIdx)
        .forEach(({ task }) => cell.appendChild(makeCard(task)));

      stackRow.appendChild(cell);
    });

    cellsEl.appendChild(stackRow);
    rowEl.appendChild(cellsEl);
    timeline.appendChild(rowEl);
  });

  wrapper.appendChild(timeline);
}

function makeCard(task) {
  const card = document.createElement('a');
  card.className = 'task-card';
  card.href = task.url;
  card.target = '_blank';
  card.rel = 'noopener noreferrer';
  card.style.background = CHANNEL_COLORS[task.channel] || '#e8e8e2';

  const name = document.createElement('div');
  name.className = 'task-name';
  name.textContent = task.name;
  card.appendChild(name);

  if (task.due_on) {
    const meta = document.createElement('div');
    meta.className = 'task-meta';
    meta.textContent = formatDate(task.due_on);
    card.appendChild(meta);
  }
  return card;
}

function formatDate(d) {
  const [, m, day] = d.split('-');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1] + ' ' + +day;
}

loadTasks();
setInterval(loadTasks, 120000);
</script>
</body>
</html>
